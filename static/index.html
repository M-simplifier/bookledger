<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookledger</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Bookledger</h1>
        <p id="summary">Loading</p>
      </div>
      <button id="refresh" type="button">更新</button>
    </header>

    <section class="toolbar" aria-label="filters">
      <input id="search" type="search" placeholder="タイトル・著者・メモを検索">
      <select id="sort" aria-label="並び順">
        <option value="active">状態順</option>
        <option value="updated">更新順</option>
        <option value="catalog">目録順</option>
      </select>
      <select id="status"></select>
      <select id="category"></select>
      <select id="series"></select>
    </section>

    <section class="grid">
      <form id="add-book" class="panel">
        <h2>追加</h2>
        <label>タイトル<input name="title" required></label>
        <label>URL<input name="url" type="url"></label>
        <label>著者<input name="author" required></label>
        <label>状態<select name="status" required></select></label>
        <label>カテゴリ<select name="category" required></select></label>
        <label>シリーズ<select name="series"></select></label>
        <label>巻<input name="volumeNo" type="number" step="0.1"></label>
        <label>メモ<textarea name="memo" rows="4"></textarea></label>
        <button type="submit">追加</button>
        <p id="form-message" class="message"></p>
      </form>

      <section class="table-panel">
        <table>
          <colgroup>
            <col class="col-title">
            <col class="col-author">
            <col class="col-status">
            <col class="col-category">
            <col class="col-series">
            <col class="col-volume">
            <col class="col-memo">
          </colgroup>
          <thead>
            <tr>
              <th>タイトル</th>
              <th>著者</th>
              <th>状態</th>
              <th>カテゴリ</th>
              <th>シリーズ</th>
              <th>巻</th>
              <th>メモ</th>
            </tr>
          </thead>
          <tbody id="books"></tbody>
        </table>
      </section>
    </section>

    <section class="manage">
      <form id="add-category">
        <input name="name" placeholder="新しいカテゴリ">
        <button type="submit">カテゴリ追加</button>
      </form>
      <form id="add-series">
        <input name="name" placeholder="新しいシリーズ">
        <button type="submit">シリーズ追加</button>
      </form>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
